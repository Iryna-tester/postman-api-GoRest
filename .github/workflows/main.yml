name: Postman API Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman Tests
        # Тут я вказав саме вашу назву файлу зі скриншоту
        run: newman run TestGoRest.postman_collection.json --env-var "token=${{ secrets.GOREST_TOKEN }}"
